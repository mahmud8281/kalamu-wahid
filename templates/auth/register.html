{% extends 'base.html' %}
{% block title %}Register — Kalamu Wahid{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-full bg-gradient-to-br from-kgreen to-kgreen-light flex items-center justify-center mx-auto mb-4 shadow-xl">
        <i class="fa-solid fa-scissors text-gold text-2xl"></i>
      </div>
      <h1 class="section-title text-3xl font-bold">Create Account</h1>
      <p class="text-gray-500 text-sm mt-2">Join Kalamu Wahid Tailoring today</p>
    </div>
    <div class="card p-8">
      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-kgreen mb-1">Full Name</label>
          <div class="relative">
            <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" name="full_name" required placeholder="Your full name" class="input-field pl-9"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-kgreen mb-1">Email Address</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="email" name="email" required placeholder="you@example.com" class="input-field pl-9"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-kgreen mb-1">Phone Number</label>
          <div class="relative">
            <i class="fa-solid fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="tel" name="phone" required placeholder="+234 800 000 0000" class="input-field pl-9"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-kgreen mb-1">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" name="password" required placeholder="••••••••" class="input-field pl-9"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-kgreen mb-1">Confirm Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" name="confirm_password" required placeholder="••••••••" class="input-field pl-9"/>
          </div>
        </div>
        <button type="submit" class="btn-gold w-full py-3 rounded-xl text-base shadow-lg">
          <i class="fa-solid fa-user-plus mr-2"></i> Create My Account
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-kgreen font-semibold hover:text-gold transition-colors">Sign in here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
