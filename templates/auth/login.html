{% extends 'base.html' %}
{% block title %}Login — Kalamu Wahid{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-full bg-gradient-to-br from-kgreen to-kgreen-light flex items-center justify-center mx-auto mb-4 shadow-xl">
        <i class="fa-solid fa-scissors text-gold text-2xl"></i>
      </div>
      <h1 class="section-title text-3xl font-bold">Welcome Back</h1>
      <p class="text-gray-500 text-sm mt-2">Sign in to your Kalamu Wahid account</p>
    </div>
    <div class="card p-8">
      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-kgreen mb-1">Email Address</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="email" name="email" required placeholder="you@example.com" class="input-field pl-9"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-kgreen mb-1">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" name="password" id="pwd" required placeholder="••••••••" class="input-field pl-9 pr-10"/>
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-kgreen">
              <i class="fa-solid fa-eye text-sm" id="eye-icon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-gold w-full py-3 rounded-xl text-base shadow-lg">
          <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="text-kgreen font-semibold hover:text-gold transition-colors">Register here</a>
      </p>
    </div>
  </div>
</div>
<script>
function togglePwd(){
  const p=document.getElementById('pwd');
  const i=document.getElementById('eye-icon');
  if(p.type==='password'){p.type='text';i.className='fa-solid fa-eye-slash text-sm';}
  else{p.type='password';i.className='fa-solid fa-eye text-sm';}
}
</script>
{% endblock %}
