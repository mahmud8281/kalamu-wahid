{% extends 'base.html' %}
{% block title %}Page Not Found — Kalamu Wahid{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-24 text-center">
  <div class="card p-12">
    <div class="w-24 h-24 rounded-full bg-kgreen/5 flex items-center
                justify-center mx-auto mb-6">
      <i class="fa-solid fa-circle-exclamation text-5xl text-kgreen/20"></i>
    </div>
    <h1 class="font-display text-6xl font-bold text-gold mb-4">404</h1>
    <h2 class="section-title text-2xl font-bold mb-3">Page Not Found</h2>
    <p class="text-gray-400 text-sm mb-8">
      The page you are looking for does not exist or has been moved.
    </p>
    <a href="{{ url_for('customer.home') }}"
       class="btn-gold px-8 py-3 rounded-xl inline-block shadow-lg">
      <i class="fa-solid fa-house mr-2"></i> Go Home
    </a>
  </div>
</div>
{% endblock %}
