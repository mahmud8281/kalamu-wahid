{% extends 'base.html' %}
{% block title %}Too Many Requests — Kalamu Wahid{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-24 text-center">
  <div class="card p-12">
    <div class="w-24 h-24 rounded-full bg-amber-50 flex items-center
                justify-center mx-auto mb-6">
      <i class="fa-solid fa-clock text-5xl text-amber-300"></i>
    </div>
    <h1 class="font-display text-6xl font-bold text-amber-400 mb-4">429</h1>
    <h2 class="section-title text-2xl font-bold mb-3">Too Many Requests</h2>
    <p class="text-gray-400 text-sm mb-8">
      You have made too many requests. Please wait a moment and try again.
    </p>
    <a href="{{ url_for('customer.home') }}"
       class="btn-gold px-8 py-3 rounded-xl inline-block shadow-lg">
      <i class="fa-solid fa-house mr-2"></i> Go Home
    </a>
  </div>
</div>
{% endblock %}
